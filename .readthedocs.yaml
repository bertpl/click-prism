version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.10"   # Matches .python-version — local = minimum supported
  jobs:
    install:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
      - uv sync --group docs
    build:
      html:
        - uv run mkdocs build --clean --site-dir $READTHEDOCS_OUTPUT/html --config-file mkdocs.yml
